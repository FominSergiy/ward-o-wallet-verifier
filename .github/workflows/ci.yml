name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # NOTE: `deno fmt --check` is intentionally not enforced yet — the repo
      # has ~42 pre-existing unformatted files in src/. Track cleanup as a
      # separate PR, then re-enable here.

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno task check

      - name: Test
        run: deno task test

  migrate:
    name: Migrate prod DB (Neon main)
    runs-on: ubuntu-latest
    # Only after tests pass, and only on a push to main — never on PRs, so PR
    # branches can't touch the prod database.
    needs: [backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: deno-deploy
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Forward-only + idempotent (scripts/migrate.ts tracks applied versions in
      # schema_migrations), so re-running on every main push is a no-op once the
      # schema is current. Runs against the prod main-branch pooled endpoint.
      # DATABASE_URL is stored in the deno-deploy GitHub environment.
      - name: Apply migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: deno run --allow-net --allow-env --allow-read scripts/migrate.ts

  frontend:
    name: Frontend (Vite + React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
