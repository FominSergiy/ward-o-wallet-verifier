name: Background Vetter

on:
  schedule:
    # Every 12 hours at :00
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  vet:
    name: Vet registry
    runs-on: ubuntu-latest
    environment: deno-deploy
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run vetter
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AGNIC_API_KEY: ${{ secrets.AGNIC_API_KEY }}
        run: |
          deno run \
            --allow-net --allow-env --allow-read --allow-write \
            scripts/vet.ts

      # $0 step: pull the OFAC SDN ETH list and warm the sanctioned denylist.
      # Requires DENO_KV_CONNECT_URL + DENO_KV_ACCESS_TOKEN secrets to populate
      # the production (Deno Deploy) KV via KV Connect — without them this warms
      # a throwaway local KV and prod is NOT updated.
      - name: Warm sanctioned denylist
        env:
          DENO_KV_CONNECT_URL: ${{ secrets.DENO_KV_CONNECT_URL }}
          DENO_KV_ACCESS_TOKEN: ${{ secrets.DENO_KV_ACCESS_TOKEN }}
        run: |
          deno run --unstable-kv \
            --allow-net --allow-env --allow-read --allow-write \
            scripts/warm-denylist.ts
