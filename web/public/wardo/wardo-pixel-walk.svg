<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 16" shape-rendering="crispEdges" role="img" aria-label="Ward-o pixel walking">
  <defs>
    <!-- reusable body (no feet); origin top-left of a 16x16 cell -->
    <symbol id="body" overflow="visible">
      <!-- fill -->
      <rect x="5" y="2" width="6" height="1" fill="#D9D5CC"/>
      <rect x="4" y="3" width="8" height="1" fill="#D9D5CC"/>
      <rect x="3" y="4" width="10" height="4" fill="#D9D5CC"/>
      <rect x="4" y="8" width="8" height="1" fill="#D9D5CC"/>
      <rect x="5" y="9" width="6" height="1" fill="#D9D5CC"/>
      <rect x="6" y="10" width="4" height="1" fill="#D9D5CC"/>
      <rect x="7" y="11" width="2" height="1" fill="#D9D5CC"/>
      <!-- outline -->
      <rect x="5" y="1" width="6" height="1" fill="#1A1A1A"/>
      <rect x="4" y="2" width="1" height="1" fill="#1A1A1A"/>
      <rect x="11" y="2" width="1" height="1" fill="#1A1A1A"/>
      <rect x="3" y="3" width="1" height="1" fill="#1A1A1A"/>
      <rect x="12" y="3" width="1" height="1" fill="#1A1A1A"/>
      <rect x="2" y="4" width="1" height="4" fill="#1A1A1A"/>
      <rect x="13" y="4" width="1" height="4" fill="#1A1A1A"/>
      <rect x="3" y="8" width="1" height="1" fill="#1A1A1A"/>
      <rect x="12" y="8" width="1" height="1" fill="#1A1A1A"/>
      <rect x="4" y="9" width="1" height="1" fill="#1A1A1A"/>
      <rect x="11" y="9" width="1" height="1" fill="#1A1A1A"/>
      <rect x="5" y="10" width="1" height="1" fill="#1A1A1A"/>
      <rect x="10" y="10" width="1" height="1" fill="#1A1A1A"/>
      <rect x="6" y="11" width="1" height="1" fill="#1A1A1A"/>
      <rect x="9" y="11" width="1" height="1" fill="#1A1A1A"/>
      <rect x="7" y="12" width="2" height="1" fill="#1A1A1A"/>
      <!-- eyes -->
      <rect x="5" y="5" width="1" height="1" fill="#1A1A1A"/>
      <rect x="10" y="5" width="1" height="1" fill="#1A1A1A"/>
      <!-- mouth: open little 'o' for walking -->
      <rect x="7" y="7" width="2" height="1" fill="#1A1A1A"/>
    </symbol>
  </defs>

  <!-- Frame 0: contact, both feet down (x=0, body y baseline) -->
  <use href="#body" x="0" y="0"/>
  <rect x="5" y="14" width="2" height="1" fill="#1A1A1A"/>
  <rect x="9" y="14" width="2" height="1" fill="#1A1A1A"/>

  <!-- Frame 1: passing, body up 1px, left foot lifted forward, right planted -->
  <use href="#body" x="16" y="-1"/>
  <!-- right foot planted -->
  <rect x="25" y="14" width="2" height="1" fill="#1A1A1A"/>
  <!-- left foot lifted forward (one row up) -->
  <rect x="20" y="13" width="2" height="1" fill="#1A1A1A"/>

  <!-- Frame 2: contact (mirror of frame 0) -->
  <use href="#body" x="32" y="0"/>
  <rect x="37" y="14" width="2" height="1" fill="#1A1A1A"/>
  <rect x="41" y="14" width="2" height="1" fill="#1A1A1A"/>

  <!-- Frame 3: passing, body up 1px, right foot lifted forward, left planted -->
  <use href="#body" x="48" y="-1"/>
  <!-- left foot planted (back) -->
  <rect x="53" y="14" width="2" height="1" fill="#1A1A1A"/>
  <!-- right foot lifted forward -->
  <rect x="58" y="13" width="2" height="1" fill="#1A1A1A"/>
</svg>
